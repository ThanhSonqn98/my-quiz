<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản trị Giáo viên - SmartQuiz Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <style>
        :root { --dark: #1e293b; --primary: #3b82f6; --light: #f8fafc; }
        body { background: var(--light); font-family: 'Inter', sans-serif; }
        .sidebar { background: var(--dark); height: 100vh; color: white; padding: 25px; position: fixed; width: 260px; z-index: 100; }
        .sidebar h4 { font-size: 1.25rem; font-weight: 800; margin-bottom: 40px; color: #fff; text-transform: uppercase; }
        .nav-link { color: #94a3b8; padding: 12px 15px; border-radius: 8px; margin-bottom: 5px; transition: 0.3s; cursor: pointer; display: block; text-decoration: none; }
        .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.1); color: white; }
        .main-content { margin-left: 260px; padding: 40px; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        .exam-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #edf2f7; }
    </style>
</head>
<body>

<div id="login-screen" class="d-flex align-items-center justify-content-center vh-100">
    <div class="card p-4" style="width: 400px;">
        <h4 class="text-center mb-4 fw-bold">Giáo viên Đăng nhập</h4>
        <div class="mb-3">
            <label class="small fw-bold">Email</label>
            <input type="email" id="admin-email" class="form-control" placeholder="admin@school.com">
        </div>
        <div class="mb-3">
            <label class="small fw-bold">Mật khẩu</label>
            <input type="password" id="admin-password" class="form-control" placeholder="••••••••">
        </div>
        <button class="btn btn-primary w-100 py-2" onclick="login()">Đăng nhập</button>
    </div>
</div>

<div id="admin-panel" class="hidden">
    <div class="sidebar">
        <h4>SmartQuiz Admin</h4>
        <div class="nav-link active" onclick="switchTab('tab-upload', this)">Tải đề thi mới</div>
        <div class="nav-link" onclick="switchTab('tab-exams', this)">Quản lý đề thi</div>
        <div class="nav-link" onclick="switchTab('tab-results', this)">Kết quả học sinh</div>
        <hr>
        <button class="btn btn-outline-light btn-sm w-100" onclick="logout()">Đăng xuất</button>
    </div>

    <div class="main-content">
        <div id="tab-upload" class="tab-content">
            <h3 class="fw-bold mb-4">Tải đề thi mới</h3>
            <div class="card p-4">
                <div class="alert alert-warning small mb-4">
                    <b>Cấu trúc file:</b> Câu 1: ... A. B. C. D. | Câu 2: ... Chọn đúng hoặc sai a) b) c) d) <br>
                    <b>Đáp án sau chữ "Hết":</b> 1.A, 2.ĐSĐS
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Tên kỳ thi</label>
                    <input type="text" id="exam-name" class="form-control" placeholder="Nhập tên đề thi">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Chọn file DOCX</label>
                    <input type="file" id="file-picker" class="form-control" accept=".docx">
                </div>
                <button class="btn btn-primary" onclick="processWordFile()">Tải lên hệ thống</button>
            </div>
        </div>

        <div id="tab-exams" class="tab-content hidden">
            <h3 class="fw-bold mb-4">Danh sách đề thi</h3>
            <div class="card p-3" id="exam-list"></div>
        </div>

        <div id="tab-results" class="tab-content hidden">
            <h3 class="fw-bold mb-4">Kết quả học sinh</h3>
            <div class="card p-3">
                <table class="table align-middle">
                    <thead><tr><th>Tên</th><th>Lớp</th><th>Đề</th><th>Điểm</th><th>Ngày</th></tr></thead>
                    <tbody id="results-body"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    // COPY CẤU HÌNH FIREBASE CỦA BẠN VÀO ĐÂY
    const firebaseConfig = {
        apiKey: "AIzaSyBZngQdNGeFNbxz35hdZKuWxqxIxJVKaAA",
  authDomain: "quizapp-f4f00.firebaseapp.com",
  projectId: "quizapp-f4f00",
  storageBucket: "quizapp-f4f00.firebasestorage.app",
  messagingSenderId: "852224211635",
  appId: "1:852224211635:web:ef5efe4e2ed092a4960ec6"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    // LOGIC ĐĂNG NHẬP KIỂU CŨ
    function login() {
        const email = document.getElementById('admin-email').value;
        const pass = document.getElementById('admin-password').value;
        auth.signInWithEmailAndPassword(email, pass)
            .then(() => {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                loadExams();
                loadResults();
            })
            .catch(err => alert("Lỗi đăng nhập: " + err.message));
    }

    function logout() {
        auth.signOut().then(() => location.reload());
    }

    // Kiểm tra trạng thái đăng nhập khi load trang
    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('admin-panel').classList.remove('hidden');
            loadExams();
            loadResults();
        }
    });

    function switchTab(tabId, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        document.getElementById(tabId).classList.remove('hidden');
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    async function processWordFile() {
        const name = document.getElementById('exam-name').value;
        const file = document.getElementById('file-picker').files[0];
        if(!name || !file) return alert("Thiếu dữ liệu!");

        mammoth.extractRawText({arrayBuffer: await file.arrayBuffer()}).then(async result => {
            const parts = result.value.split(/Hết/i);
            if(parts.length < 2) return alert("Thiếu chữ 'Hết'!");
            
            const ansMap = {};
            const matches = parts[1].matchAll(/(\d+)[\.\s]*([A-DĐS]+)/gi);
            for (const m of matches) {
                const val = m[2].toUpperCase();
                ansMap[m[1]] = (val.includes('Đ') || val.includes('S')) 
                    ? val.split('').map(c => c === 'Đ') 
                    : val.charCodeAt(0) - 65;
            }

            const examDoc = await db.collection("exams").add({name, createdAt: new Date(), isActive: false});
            const blocks = parts[0].split(/Câu \d+[:.]/g).filter(b => b.trim().length > 10);
            
            for(let i=0; i<blocks.length; i++) {
                const block = blocks[i];
                const isTF = block.toLowerCase().includes("đúng hoặc sai");
                if(isTF) {
                    const lines = block.split(/[a-d]\)/g);
                    if(lines.length >= 5) {
                        await db.collection("questions").add({
                            examId: examDoc.id, type: "tf",
                            q: lines[0].trim().replace("Chọn đúng hoặc sai", ""),
                            options: [lines[1].trim(), lines[2].trim(), lines[3].trim(), lines[4].trim()],
                            correct: ansMap[i+1] || [true, true, true, true],
                            order: i+1
                        });
                    }
                } else {
                    const lines = block.split(/[A-D][.:]/g);
                    if(lines.length >= 5) {
                        await db.collection("questions").add({
                            examId: examDoc.id, type: "mcq",
                            q: lines[0].trim(),
                            a: [lines[1].trim(), lines[2].trim(), lines[3].trim(), lines[4].trim()],
                            correct: ansMap[i+1] || 0,
                            order: i+1
                        });
                    }
                }
            }
            alert("Đã tải lên thành công!");
        });
    }

    function loadExams() {
        db.collection("exams").orderBy("createdAt", "desc").onSnapshot(snap => {
            const list = document.getElementById('exam-list');
            list.innerHTML = '';
            snap.forEach(doc => {
                const d = doc.data();
                list.innerHTML += `
                    <div class="exam-item">
                        <div><b>${d.name}</b> <br> <small>${d.isActive?'Đang mở':'Đang đóng'}</small></div>
                        <div>
                            <button class="btn btn-sm btn-info" onclick="db.collection('exams').doc('${doc.id}').update({isActive:${!d.isActive}})">Mở/Đóng</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteExam('${doc.id}')">Xóa</button>
                        </div>
                    </div>`;
            });
        });
    }

    async function deleteExam(id) {
        if(!confirm("Xóa đề này?")) return;
        const qs = await db.collection("questions").where("examId", "==", id).get();
        const batch = db.batch();
        qs.forEach(q => batch.delete(q.ref));
        batch.delete(db.collection("exams").doc(id));
        await batch.commit();
    }

    function loadResults() {
        db.collection("results").orderBy("time", "desc").onSnapshot(snap => {
            const body = document.getElementById('results-body');
            body.innerHTML = '';
            snap.forEach(doc => {
                const d = doc.data();
                body.innerHTML += `<tr><td>${d.name}</td><td>${d.class}</td><td>${d.examId}</td><td>${d.grade10}</td><td>${new Date(d.time.seconds*1000).toLocaleDateString()}</td></tr>`;
            });
        });
    }
</script>
</body>
</html>
