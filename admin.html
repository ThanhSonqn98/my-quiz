<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bảng điểm Giáo viên</title>
</head>
<body>
    <h2>Danh sách điểm học sinh</h2>
    <table border="1" id="scoreTable" style="width:100%; text-align:left;">
        <tr><th>Tên</th><th>Lớp</th><th>Điểm</th></tr>
    </table>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = { /* DÁN GIỐNG HỆT FILE INDEX */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        db.collection("results").orderBy("time", "desc").onSnapshot((snapshot) => {
            const table = document.getElementById('scoreTable');
            table.innerHTML = '<tr><th>Tên</th><th>Lớp</th><th>Điểm</th></tr>';
            snapshot.forEach((doc) => {
                const data = doc.data();
                table.innerHTML += `<tr><td>${data.name}</td><td>${data.class}</td><td>${data.score}</td></tr>`;
            });
        });
    </script>
</body>
</html>
