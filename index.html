<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Thi Trắc Nghiệm - SmartQuiz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .quiz-container { max-width: 700px; margin: 50px auto; }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .option-btn { width: 100%; text-align: left; margin-bottom: 12px; padding: 15px; border: 1px solid #dee2e6; border-radius: 12px; background: #fff; transition: 0.3s; font-size: 1.1rem; }
        .option-btn:hover:not([disabled]) { background: #f8f9fa; border-color: #3498db; transform: translateY(-2px); }
        .correct { background: #27ae60 !important; color: white; border-color: #27ae60; }
        .wrong { background: #e74c3c !important; color: white; border-color: #e74c3c; }
        .hidden { display: none; }
        #timer { font-size: 1.3rem; font-weight: bold; color: #e74c3c; }
        .exam-info-box { background: #e7f3ff; padding: 15px; border-radius: 10px; margin-bottom: 20px; color: #0c5460; }
        .badge-score { font-size: 1.5rem; padding: 10px 20px; border-radius: 50px; }
    </style>
</head>
<body>

<div class="container quiz-container">
    <div id="auth-screen" class="card p-4 text-center">
        <h2 class="mb-4">Thông tin Thí sinh</h2>
        
        <div id="loading-status" class="alert alert-info">Đang kiểm tra đề thi từ hệ thống...</div>

        <div id="auth-form" class="hidden">
            <div class="exam-info-box text-start">
                Đề thi đang mở: <b id="active-exam-title">---</b>
            </div>
            <div class="mb-3 text-start">
                <label class="form-label">Họ và Tên học sinh</label>
                <input type="text" id="student-name" class="form-control form-control-lg" placeholder="Ví dụ: Nguyễn Văn A">
            </div>
            <div class="mb-3 text-start">
                <label class="form-label">Lớp</label>
                <input type="text" id="student-class" class="form-control form-control-lg" placeholder="Ví dụ: 5A1">
            </div>
            <button onclick="startQuiz()" class="btn btn-primary btn-lg w-100 shadow-sm">Bắt đầu làm bài</button>
        </div>
    </div>

    <div id="quiz-screen" class="card p-4 hidden">
        <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2">
            <div><b id="display-name"></b> - <span id="display-class"></span></div>
            <div id="timer">15:00</div>
        </div>
        
        <div id="question-box">
            <h4 id="question-text" class="mb-4" style="line-height: 1.6;"></h4>
            <div id="options-box"></div>
        </div>

        <div class="mt-4 text-center text-muted border-top pt-3">
            Câu hỏi: <span id="current-idx">1</span> / <span id="total-idx">0</span>
        </div>
    </div>

    <div id="result-screen" class="card p-5 text-center hidden">
        <h1 class="display-4">Hoàn thành!</h1>
        <hr>
        <div id="score-details" class="my-4">
            <p class="lead mb-1">Số câu đúng của bạn:</p>
            <h2 class="display-3 text-primary"><span id="correct-count">0</span><small class="text-muted" style="font-size: 1.5rem;">/<span id="total-count">0</span></small></h2>
            
            <div id="grade-box" class="mt-4">
                </div>
        </div>
        <button onclick="location.reload()" class="btn btn-secondary px-5 py-2 mt-3">Thoát hệ thống</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>

<script>
    // --- 1. CONFIG FIREBASE (Thay bằng mã của bạn) ---
    const firebaseConfig = {
        apiKey: "AIzaSyBZngQdNGeFNbxz35hdZKuWxqxIxJVKaAA",
  authDomain: "quizapp-f4f00.firebaseapp.com",
  projectId: "quizapp-f4f00",
  storageBucket: "quizapp-f4f00.firebasestorage.app",
  messagingSenderId: "852224211635",
  appId: "1:852224211635:web:ef5efe4e2ed092a4960ec6"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // --- 2. BIẾN TOÀN CỤC ---
    let activeExam = null;
    let questions = [];
    let currentIndex = 0;
    let score = 0;
    let timerInterval;

    // --- 3. TÌM ĐỀ THI ĐANG MỞ (REAL-TIME) ---
    db.collection("exams").where("isActive", "==", true).limit(1).onSnapshot(snap => {
        const loadingBox = document.getElementById('loading-status');
        const authForm = document.getElementById('auth-form');

        if (snap.empty) {
            loadingBox.className = "alert alert-danger";
            loadingBox.innerText = "Hiện không có đề thi nào đang mở từ giáo viên.";
            authForm.classList.add('hidden');
            return;
        }

        const doc = snap.docs[0];
        activeExam = { id: doc.id, ...doc.data() };
        document.getElementById('active-exam-title').innerText = activeExam.name;
        
        // Tải câu hỏi thuộc đề này
        db.collection("questions").where("examId", "==", activeExam.id).get().then(qSnap => {
            questions = qSnap.docs.map(d => d.data());
            document.getElementById('total-idx').innerText = questions.length;
            document.getElementById('total-count').innerText = questions.length;
            
            loadingBox.classList.add('hidden');
            authForm.classList.remove('hidden');
        });
    });

    // --- 4. LOGIC LÀM BÀI ---
    function startQuiz() {
        const name = document.getElementById('student-name').value;
        const clazz = document.getElementById('student-class').value;
        if(!name || !clazz) return alert("Vui lòng nhập đầy đủ Họ tên và Lớp!");

        document.getElementById('display-name').innerText = name;
        document.getElementById('display-class').innerText = clazz;
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');

        showQuestion();
        startTimer(15); // Mặc định 15 phút
    }

    function showQuestion() {
        const qData = questions[currentIndex];
        document.getElementById('question-text').innerText = `Câu ${currentIndex + 1}: ${qData.q}`;
        document.getElementById('current-idx').innerText = currentIndex + 1;

        const box = document.getElementById('options-box');
        box.innerHTML = '';

        qData.a.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => handleCheck(btn, idx, qData.correct);
            box.appendChild(btn);
        });
    }

    function handleCheck(btn, selectedIdx, correctIdx) {
        const btns = document.querySelectorAll('.option-btn');
        btns.forEach(b => b.disabled = true);

        if(selectedIdx === correctIdx) {
            btn.classList.add('correct');
            score++;
        } else {
            btn.classList.add('wrong');
            if(btns[correctIdx]) btns[correctIdx].classList.add('correct');
        }

        setTimeout(() => {
            currentIndex++;
            if(currentIndex < questions.length) {
                showQuestion();
            } else {
                finishQuiz();
            }
        }, 1200);
    }

    function startTimer(min) {
        let sec = min * 60;
        timerInterval = setInterval(() => {
            let m = Math.floor(sec / 60);
            let s = sec % 60;
            document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
            if(sec <= 0) { clearInterval(timerInterval); finishQuiz(); }
            sec--;
        }, 1000);
    }

    // --- 5. CHẤM ĐIỂM & KẾT THÚC ---
    function finishQuiz() {
        clearInterval(timerInterval);
        const total = questions.length;
        const grade10 = ((score / total) * 10).toFixed(2); // Điểm hệ 10

        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('correct-count').innerText = score;

        // Xếp loại nhận xét
        let comment = "", colorClass = "bg-primary";
        if (grade10 >= 9) { comment = "Xuất sắc! 🎉"; colorClass = "bg-success"; }
        else if (grade10 >= 7) { comment = "Rất tốt! 👍"; colorClass = "bg-info"; }
        else if (grade10 >= 5) { comment = "Hoàn thành bài thi. 👌"; colorClass = "bg-warning"; }
        else { comment = "Cố gắng hơn ở lần sau nhé! 💪"; colorClass = "bg-danger"; }

        document.getElementById('grade-box').innerHTML = `
            <div class="h3 mb-3">${comment}</div>
            <div class="mb-2">Điểm hệ 10:</div>
            <span class="badge ${colorClass} badge-score">${grade10}</span>
        `;

        // Lưu vào Firebase
        db.collection("results").add({
            name: document.getElementById('student-name').value,
            class: document.getElementById('student-class').value,
            examId: activeExam.id,
            examName: activeExam.name,
            score: score,
            total: total,
            grade10: grade10,
            time: new Date()
        });
    }
</script>
</body>
</html>
