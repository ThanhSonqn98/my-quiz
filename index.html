<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>SmartQuiz Student - MultiFormat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .quiz-container { max-width: 700px; margin: 40px auto; }
        .card { border-radius: 15px; border: none; box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
        .option-btn { width: 100%; text-align: left; margin-bottom: 10px; padding: 15px; border: 1px solid #ddd; border-radius: 10px; background: #fff; }
        .correct { background: #27ae60 !important; color: white; }
        .wrong { background: #e74c3c !important; color: white; }
        .drop-zone { border-bottom: 2px solid #3498db; color: #3498db; font-weight: bold; padding: 0 10px; min-width: 50px; display: inline-block; text-align: center; }
        .hidden { display: none; }
        .my-rank { background: #fff3cd; }
    </style>
</head>
<body>

<div class="container quiz-container">
    <div id="auth-screen" class="card p-4 text-center">
        <h2>SmartQuiz 🚀</h2>
        <div id="exam-status" class="alert alert-info mt-3">Đang tìm đề...</div>
        <div id="auth-form" class="hidden text-start">
            <input type="text" id="name" class="form-control mb-3" placeholder="Họ tên">
            <input type="text" id="class" class="form-control mb-3" placeholder="Lớp">
            <button onclick="startQuiz()" class="btn btn-primary w-100 btn-lg">Bắt đầu thi</button>
        </div>
    </div>

    <div id="quiz-screen" class="card p-4 hidden">
        <div class="d-flex justify-content-between mb-3"><span id="timer" class="text-danger fw-bold">15:00</span> <span id="idx-text"></span></div>
        <div id="question-area"></div>
    </div>

    <div id="result-screen" class="card p-4 hidden">
        <h2 class="text-center">Kết quả: <span id="final-score"></span>đ</h2>
        <div class="table-responsive mt-4">
            <table class="table"><tbody id="rank-list"></tbody></table>
        </div>
        <button onclick="location.reload()" class="btn btn-secondary w-100">Thoát</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBZngQdNGeFNbxz35hdZKuWxqxIxJVKaAA",
  authDomain: "quizapp-f4f00.firebaseapp.com",
  projectId: "quizapp-f4f00",
  storageBucket: "quizapp-f4f00.firebasestorage.app",
  messagingSenderId: "852224211635",
  appId: "1:852224211635:web:ef5efe4e2ed092a4960ec6" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let activeEx = null, questions = [], curIdx = 0, score = 0, timer;

    db.collection("exams").where("isActive", "==", true).limit(1).onSnapshot(snap => {
        if(snap.empty) return;
        activeEx = {id: snap.docs[0].id, ...snap.docs[0].data()};
        document.getElementById('exam-status').classList.add('hidden');
        document.getElementById('auth-form').classList.remove('hidden');
        db.collection("questions").where("examId", "==", activeEx.id).get().then(q => questions = q.docs.map(d => d.data()));
    });

    function startQuiz() {
        if(!document.getElementById('name').value) return;
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        showQ(); startTimer(15);
    }

    function showQ() {
        const q = questions[curIdx];
        document.getElementById('idx-text').innerText = `Câu ${curIdx+1}/${questions.length}`;
        const area = document.getElementById('question-area');
        area.innerHTML = `<h4 class="mb-4">${q.q.replace(/\[\.\.\.\]/g, '<span class="drop-zone">...</span>')}</h4>`;

        if(q.type === "choice") {
            let opts = q.a.map((t, i) => ({t, is: i === q.correct}));
            opts.sort(() => Math.random() - 0.5); // Random đáp án
            opts.forEach(o => {
                const b = document.createElement('button'); b.className = 'option-btn'; b.innerText = o.t;
                b.onclick = () => { 
                    document.querySelectorAll('.option-btn').forEach(btn => btn.disabled = true);
                    if(o.is) { b.classList.add('correct'); score++; } else { b.classList.add('wrong'); }
                    next();
                };
                area.appendChild(b);
            });
        } else if(q.type === "short") {
            area.innerHTML += `<input type="text" id="short-ans" class="form-control mb-3" placeholder="Nhập đáp án...">
                               <button onclick="checkShort()" class="btn btn-success w-100">Nộp</button>`;
        } else if(q.type === "drag") {
            let btnBox = '<div class="mt-3">';
            q.options.forEach(o => btnBox += `<button class="btn btn-outline-primary m-1" onclick="fillDrag(this)">${o}</button>`);
            area.innerHTML += btnBox + '</div><button onclick="checkDrag()" class="btn btn-success w-100 mt-3">Xác nhận</button>';
        }
    }

    function fillDrag(btn) {
        const zones = document.querySelectorAll('.drop-zone');
        for(let z of zones) { if(z.innerText === "...") { z.innerText = btn.innerText; btn.disabled = true; break; } }
    }

    function checkDrag() {
        const ans = Array.from(document.querySelectorAll('.drop-zone')).map(z => z.innerText);
        if(JSON.stringify(ans) === JSON.stringify(questions[curIdx].correctOrder)) score++;
        next();
    }

    function checkShort() {
        const val = document.getElementById('short-ans').value.trim().toLowerCase();
        if(val === questions[curIdx].correctAns.toLowerCase()) score++;
        next();
    }

    function next() { setTimeout(() => { curIdx++; if(curIdx < questions.length) showQ(); else finish(); }, 1200); }

    function startTimer(m) {
        let s = m * 60;
        timer = setInterval(() => {
            document.getElementById('timer').innerText = `${Math.floor(s/60)}:${s%60<10?'0':''}${s%60}`;
            if(s-- <= 0) { clearInterval(timer); finish(); }
        }, 1000);
    }

    function finish() {
        clearInterval(timer);
        const g10 = ((score/questions.length)*10).toFixed(2);
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('final-score').innerText = g10;
        const name = document.getElementById('name').value;
        db.collection("results").add({name, class: document.getElementById('class').value, examId: activeEx.id, score, wrong: questions.length-score, grade10: g10, time: new Date()})
        .then(() => loadRank(activeEx.id, name));
    }

    function loadRank(id, myName) {
        db.collection("results").where("examId", "==", id).orderBy("score", "desc").orderBy("time", "asc").onSnapshot(snap => {
            const list = document.getElementById('rank-list'); list.innerHTML = '';
            snap.docs.forEach((d, i) => {
                const data = d.data();
                list.innerHTML += `<tr class="${data.name === myName?'my-rank':''}"><td>${i+1}</td><td>${data.name}</td><td>${data.grade10}đ</td></tr>`;
            });
        });
    }
</script>
</body>
</html>
