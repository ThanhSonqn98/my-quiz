<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>SmartQuiz - Trải nghiệm thi đấu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f9; font-family: 'Segoe UI', sans-serif; }
        .quiz-container { max-width: 750px; margin: 40px auto; }
        .card { border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .option-btn { width: 100%; text-align: left; margin-bottom: 12px; padding: 16px; border: 1px solid #dee2e6; border-radius: 12px; background: #fff; transition: 0.2s; }
        .option-btn:hover:not([disabled]) { background: #f0f7ff; border-color: #3498db; }
        .correct { background: #27ae60 !important; color: white; border-color: #27ae60; }
        .wrong { background: #e74c3c !important; color: white; border-color: #e74c3c; }
        /* Style cho Kéo thả */
        .drop-zone { border-bottom: 2px solid #3498db; color: #3498db; font-weight: bold; padding: 0 10px; min-width: 60px; display: inline-block; text-align: center; cursor: pointer; }
        .word-pool { background: #f8f9fa; padding: 15px; border-radius: 12px; border: 1px dashed #cbd5e0; }
        
        .my-rank { background: #fff3cd !important; border: 2px solid #ffc107 !important; }
        .hidden { display: none; }
        #timer { font-size: 1.4rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="container quiz-container">
    <div id="auth-screen" class="card p-5 text-center">
        <h2 class="fw-bold mb-4">SmartQuiz 🚀</h2>
        <div id="exam-status" class="alert alert-primary">Đang kết nối máy chủ...</div>
        <div id="auth-form" class="hidden text-start">
            <div class="mb-3">
                <label class="form-label fw-bold">Họ và Tên</label>
                <input type="text" id="name" class="form-control form-control-lg" placeholder="Ví dụ: Trần Thị Bình">
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold">Lớp</label>
                <input type="text" id="class" class="form-control form-control-lg" placeholder="Ví dụ: 5A2">
            </div>
            <button onclick="startQuiz()" class="btn btn-primary w-100 btn-lg shadow">Vào thi ngay</button>
        </div>
    </div>

    <div id="quiz-screen" class="card p-4 hidden">
        <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2">
            <span id="timer" class="text-danger">15:00</span>
            <span class="badge bg-secondary">Câu: <span id="current-idx">1</span> / <span id="total-idx">0</span></span>
        </div>
        <div id="question-content">
            <h4 id="q-text" class="mb-4 fw-bold" style="line-height: 1.6;"></h4>
            <div id="options-box"></div>
        </div>
    </div>

    <div id="result-screen" class="card p-4 hidden">
        <div class="text-center mb-4">
            <h1 class="display-5 fw-bold">Kết quả: <span id="final-score">0</span>đ</h1>
            <p class="text-muted" id="stat-detail">Đúng: 0 | Sai: 0</p>
        </div>
        <h5 class="fw-bold mb-3 mt-4">🏆 Bảng Xếp Hạng Đề Thi</h5>
        <div class="table-responsive">
            <table class="table align-middle">
                <thead class="table-light">
                    <tr><th>#</th><th>Học sinh</th><th>Đúng</th><th>Sai</th><th>Điểm</th></tr>
                </thead>
                <tbody id="rank-list"></tbody>
            </table>
        </div>
        <button onclick="location.reload()" class="btn btn-outline-secondary w-100 mt-3">Thoát</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>

<script>
    // --- CẤU HÌNH FIREBASE ---
    const firebaseConfig = { apiKey: "YOUR_API_KEY", authDomain: "...", projectId: "...", storageBucket: "...", messagingSenderId: "...", appId: "..." };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let activeEx = null, questions = [], curIdx = 0, score = 0, timer;

    // --- LẤY ĐỀ THI ---
    db.collection("exams").where("isActive", "==", true).limit(1).onSnapshot(snap => {
        if(snap.empty) { document.getElementById('exam-status').innerText = "Hiện không có đề mở."; return; }
        activeEx = {id: snap.docs[0].id, ...snap.docs[0].data()};
        document.getElementById('exam-status').classList.add('hidden');
        document.getElementById('auth-form').classList.remove('hidden');
        db.collection("questions").where("examId", "==", activeEx.id).get().then(q => {
            questions = q.docs.map(d => d.data());
            document.getElementById('total-idx').innerText = questions.length;
        });
    });

    function startQuiz() {
        if(!document.getElementById('name').value) return alert("Vui lòng nhập tên!");
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        showQ(); startTimer(15);
    }

    function showQ() {
        const q = questions[curIdx];
        const box = document.getElementById('options-box');
        box.innerHTML = '';
        document.getElementById('current-idx').innerText = curIdx + 1;

        if (q.type === "drag") {
            // Hiển thị dạng Kéo thả (Click to fill)
            let text = q.q.replace(/\[\.\.\.\]/g, '<span class="drop-zone" onclick="clearZone(this)">...</span>');
            document.getElementById('q-text').innerHTML = text;
            
            let btnHtml = '<div class="word-pool mt-3 text-center">';
            q.options.sort(() => Math.random() - 0.5).forEach(opt => {
                btnHtml += `<button class="btn btn-outline-primary m-1 drag-word" onclick="fillZone(this)">${opt}</button>`;
            });
            btnHtml += '</div><button onclick="checkDrag()" class="btn btn-primary w-100 mt-4 btn-lg shadow-sm">Xác nhận đáp án</button>';
            box.innerHTML = btnHtml;

        } else if (q.type === "short") {
            // Hiển thị dạng Trả lời ngắn
            document.getElementById('q-text').innerText = `Câu ${curIdx+1}: ${q.q}`;
            box.innerHTML = `
                <input type="text" id="short-ans" class="form-control form-control-lg mb-3" placeholder="Nhập đáp án của bạn...">
                <button onclick="checkShort()" class="btn btn-success w-100 btn-lg shadow-sm">Nộp bài</button>
            `;
        } else {
            // Hiển thị Trắc nghiệm / Đúng Sai
            document.getElementById('q-text').innerText = `Câu ${curIdx+1}: ${q.q}`;
            let opts = q.a.map((t, i) => ({t, is: i === q.correct}));
            opts.sort(() => Math.random() - 0.5);
            opts.forEach(o => {
                const b = document.createElement('button');
                b.className = 'option-btn';
                b.innerText = o.t;
                b.onclick = () => {
                    document.querySelectorAll('.option-btn').forEach(btn => btn.disabled = true);
                    if(o.is) { b.classList.add('correct'); score++; } else { b.classList.add('wrong'); }
                    next();
                };
                box.appendChild(b);
            });
        }
    }

    // --- LOGIC XỬ LÝ KÉO THẢ (CLICK TO FILL) ---
    function fillZone(btn) {
        const zones = document.querySelectorAll('.drop-zone');
        for (let z of zones) {
            if (z.innerText === "...") {
                z.innerText = btn.innerText;
                btn.style.visibility = 'hidden';
                break;
            }
        }
    }

    function clearZone(zone) {
        if (zone.innerText === "...") return;
        const btns = document.querySelectorAll('.drag-word');
        btns.forEach(b => { if (b.innerText === zone.innerText) b.style.visibility = 'visible'; });
        zone.innerText = "...";
    }

    function checkDrag() {
        const zones = document.querySelectorAll('.drop-zone');
        const userAns = Array.from(zones).map(z => z.innerText);
        const correct = questions[curIdx].correctOrder;
        if (JSON.stringify(userAns) === JSON.stringify(correct)) score++;
        next();
    }

    function checkShort() {
        const val = document.getElementById('short-ans').value.trim().toLowerCase();
        const correct = questions[curIdx].correctAns.toLowerCase();
        if (val === correct) score++;
        next();
    }

    function next() { setTimeout(() => { curIdx++; if(curIdx < questions.length) showQ(); else finish(); }, 1200); }

    function startTimer(m) {
        let s = m * 60;
        timer = setInterval(() => {
            let mins = Math.floor(s/60), secs = s%60;
            document.getElementById('timer').innerText = `${mins}:${secs<10?'0':''}${secs}`;
            if(s-- <= 0) { clearInterval(timer); finish(); }
        }, 1000);
    }

    function finish() {
        clearInterval(timer);
        const total = questions.length;
        const g10 = ((score/total)*10).toFixed(2);
        const studentName = document.getElementById('name').value;
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('final-score').innerText = g10;
        document.getElementById('stat-detail').innerText = `Đúng: ${score} | Sai: ${total - score}`;

        const res = { name: studentName, class: document.getElementById('class').value, examId: activeEx.id, score: score, wrong: total - score, grade10: g10, time: new Date() };
        db.collection("results").add(res).then(() => loadRanking(activeEx.id, studentName));
    }

    function loadRanking(exId, myName) {
        db.collection("results").where("examId", "==", exId).orderBy("score", "desc").orderBy("time", "asc").onSnapshot(snap => {
            const list = document.getElementById('rank-list');
            list.innerHTML = '';
            snap.docs.forEach((doc, i) => {
                const d = doc.data();
                const isMe = (d.name === myName);
                list.innerHTML += `<tr class="${isMe ? 'my-rank fw-bold' : ''}"><td>${i+1}</td><td>${d.name} ${isMe ? '(Bạn)' : ''}</td><td class="text-success">${d.score}</td><td class="text-danger">${d.wrong || 0}</td><td><span class="badge bg-primary">${d.grade10}</span></td></tr>`;
            });
        });
    }
</script>
</body>
</html>
