<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>SmartQuiz - Học sinh</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .quiz-container { max-width: 650px; margin: 40px auto; }
        .card { border-radius: 15px; border: none; box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
        .option-btn { width: 100%; text-align: left; margin-bottom: 12px; padding: 15px; border: 1px solid #ddd; border-radius: 10px; background: #fff; }
        .correct { background: #27ae60 !important; color: white; }
        .wrong { background: #e74c3c !important; color: white; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container quiz-container">
    <div id="auth-screen" class="card p-4 text-center">
        <h2>SmartQuiz</h2>
        <div id="exam-status" class="alert alert-info mt-3">Đang tìm đề thi...</div>
        <div id="auth-form" class="hidden text-start">
            <label class="form-label">Họ và Tên</label>
            <input type="text" id="name" class="form-control mb-3">
            <label class="form-label">Lớp</label>
            <input type="text" id="class" class="form-control mb-3">
            <button onclick="startQuiz()" class="btn btn-primary w-100 btn-lg">Bắt đầu thi</button>
        </div>
    </div>

    <div id="quiz-screen" class="card p-4 hidden">
        <div class="d-flex justify-content-between mb-3 border-bottom pb-2">
            <span id="timer" class="fw-bold text-danger">15:00</span>
            <span>Câu: <span id="current-idx">1</span>/<span id="total-idx">0</span></span>
        </div>
        <h4 id="q-text" class="mb-4"></h4>
        <div id="options-box"></div>
    </div>

    <div id="result-screen" class="card p-5 text-center hidden">
        <h1>Kết quả</h1>
        <h2 class="display-2 text-primary mt-3"><span id="final-score">0</span>đ</h2>
        <div id="rank-box" class="alert alert-warning h4 mt-4">Tính toán thứ hạng...</div>
        <button onclick="location.reload()" class="btn btn-secondary mt-3">Thoát</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>

<script>
    // CẤU HÌNH FIREBASE (GIỐNG FILE ADMIN)
    const firebaseConfig = { apiKey: "AIzaSyBZngQdNGeFNbxz35hdZKuWxqxIxJVKaAA",
  authDomain: "quizapp-f4f00.firebaseapp.com",
  projectId: "quizapp-f4f00",
  storageBucket: "quizapp-f4f00.firebasestorage.app",
  messagingSenderId: "852224211635",
  appId: "1:852224211635:web:ef5efe4e2ed092a4960ec6" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let activeEx = null, questions = [], curIdx = 0, score = 0, timer;

    db.collection("exams").where("isActive", "==", true).limit(1).onSnapshot(snap => {
        if(snap.empty) return document.getElementById('exam-status').innerText = "Không có đề nào mở.";
        activeEx = {id: snap.docs[0].id, ...snap.docs[0].data()};
        document.getElementById('exam-status').classList.add('hidden');
        document.getElementById('auth-form').classList.remove('hidden');
        db.collection("questions").where("examId", "==", activeEx.id).get().then(q => {
            questions = q.docs.map(d => d.data());
            document.getElementById('total-idx').innerText = questions.length;
        });
    });

    function startQuiz() {
        if(!document.getElementById('name').value) return alert("Nhập tên!");
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        showQ(); startTimer(15);
    }

    function showQ() {
        const q = questions[curIdx];
        document.getElementById('q-text').innerText = `Câu ${curIdx+1}: ${q.q}`;
        const box = document.getElementById('options-box'); box.innerHTML = '';
        q.a.forEach((opt, i) => {
            const btn = document.createElement('button'); btn.className = 'option-btn'; btn.innerText = opt;
            btn.onclick = () => check(btn, i, q.correct); box.appendChild(btn);
        });
    }

    function check(btn, i, cor) {
        const btns = document.querySelectorAll('.option-btn');
        btns.forEach(b => b.disabled = true);
        if(i === cor) { btn.classList.add('correct'); score++; }
        else { btn.classList.add('wrong'); btns[cor].classList.add('correct'); }
        setTimeout(() => {
            curIdx++; if(curIdx < questions.length) { showQ(); document.getElementById('current-idx').innerText = curIdx+1; }
            else finish();
        }, 1200);
    }

    function startTimer(m) {
        let s = m * 60;
        timer = setInterval(() => {
            let mins = Math.floor(s/60), secs = s%60;
            document.getElementById('timer').innerText = `${mins}:${secs<10?'0':''}${secs}`;
            if(s-- <= 0) { clearInterval(timer); finish(); }
        }, 1000);
    }

    function finish() {
        clearInterval(timer);
        const g10 = ((score/questions.length)*10).toFixed(2);
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('final-score').innerText = g10;
        const res = { name: document.getElementById('name').value, class: document.getElementById('class').value, examId: activeEx.id, score: score, grade10: g10, time: new Date() };
        db.collection("results").add(res).then(() => calcRank(activeEx.id, g10));
    }

    function calcRank(exId, g10) {
        db.collection("results").where("examId", "==", exId).orderBy("score", "desc").orderBy("time", "asc").get().then(snap => {
            let r = 0;
            snap.docs.forEach((d, i) => { if(d.data().name === document.getElementById('name').value) r = i + 1; });
            document.getElementById('rank-box').innerText = `Xếp hạng: ${r} / ${snap.size}`;
        });
    }
</script>
</body>
</html>
