<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Thi Trắc Nghiệm - SmartQuiz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .quiz-container { max-width: 700px; margin: 50px auto; }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .option-btn { width: 100%; text-align: left; margin-bottom: 12px; padding: 15px; border: 1px solid #dee2e6; border-radius: 12px; background: #fff; transition: 0.3s; font-size: 1.1rem; }
        .option-btn:hover:not([disabled]) { background: #e9ecef; border-color: #3498db; transform: translateY(-2px); }
        .correct { background: #27ae60 !important; color: white; border-color: #27ae60; }
        .wrong { background: #e74c3c !important; color: white; border-color: #e74c3c; }
        .hidden { display: none; }
        #timer { font-size: 1.3rem; font-weight: bold; color: #e74c3c; }
        .exam-info { background: #e8f4fd; padding: 10px; border-radius: 8px; margin-bottom: 20px; color: #2c3e50; }
    </style>
</head>
<body>

<div class="container quiz-container">
    <div id="auth-screen" class="card p-4 text-center">
        <h2 class="mb-4">Thông tin Thí sinh</h2>
        <div id="exam-loading" class="alert alert-warning">Đang kiểm tra đề thi từ giáo viên...</div>
        
        <div id="auth-form" class="hidden">
            <div class="exam-info">
                Đang mở: <b id="active-exam-title"></b>
            </div>
            <div class="mb-3 text-start">
                <label class="form-label">Họ và Tên</label>
                <input type="text" id="student-name" class="form-control form-control-lg" placeholder="Nguyễn Văn A">
            </div>
            <div class="mb-3 text-start">
                <label class="form-label">Lớp</label>
                <input type="text" id="student-class" class="form-control form-control-lg" placeholder="Ví dụ: 5A1">
            </div>
            <button onclick="startQuiz()" class="btn btn-primary btn-lg w-100">Bắt đầu làm bài</button>
        </div>
    </div>

    <div id="quiz-screen" class="card p-4 hidden">
        <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2">
            <div><b id="display-name"></b> - <span id="display-class"></span></div>
            <div id="timer">15:00</div>
        </div>
        
        <div id="question-box">
            <h4 id="question-text" class="mb-4" style="line-height: 1.5;"></h4>
            <div id="options-box"></div>
        </div>

        <div class="mt-4 text-center text-muted border-top pt-3">
            Câu hỏi: <span id="current-idx">1</span> / <span id="total-idx">0</span>
        </div>
    </div>

    <div id="result-screen" class="card p-5 text-center hidden">
        <h1 class="display-4">Hoàn thành!</h1>
        <p class="lead">Kết quả bài thi của bạn:</p>
        <h2 class="display-1 text-primary"><span id="final-score">0</span><small class="text-muted" style="font-size: 2rem;">/<span id="final-total">0</span></small></h2>
        <div id="score-percent" class="h4 mb-4"></div>
        <button onclick="location.reload()" class="btn btn-secondary px-5">Thoát</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>

<script>
    // --- 1. CONFIG FIREBASE (Dán mã của bạn vào đây) ---
    const firebaseConfig = {
        apiKey: "AIzaSyBZngQdNGeFNbxz35hdZKuWxqxIxJVKaAA",
  authDomain: "quizapp-f4f00.firebaseapp.com",
  projectId: "quizapp-f4f00",
  storageBucket: "quizapp-f4f00.firebasestorage.app",
  messagingSenderId: "852224211635",
  appId: "1:852224211635:web:ef5efe4e2ed092a4960ec6"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // --- 2. BIẾN TOÀN CỤC ---
    let currentExam = null;
    let questions = [];
    let currentIndex = 0;
    let score = 0;
    let timerInterval;

    // --- 3. TỰ ĐỘNG LẤY ĐỀ THI ĐANG MỞ ---
    db.collection("exams").where("isActive", "==", true).limit(1).onSnapshot(snap => {
        const loadingBox = document.getElementById('exam-loading');
        const authForm = document.getElementById('auth-form');
        
        if (snap.empty) {
            loadingBox.className = "alert alert-danger";
            loadingBox.innerText = "Hiện tại không có đề thi nào được mở. Vui lòng đợi giáo viên!";
            authForm.classList.add('hidden');
            return;
        }

        const doc = snap.docs[0];
        currentExam = { id: doc.id, ...doc.data() };
        
        // Hiển thị tên đề thi
        document.getElementById('active-exam-title').innerText = currentExam.name;
        loadingBox.classList.add('hidden');
        authForm.classList.remove('hidden');

        // Tải câu hỏi thuộc đề này
        db.collection("questions").where("examId", "==", currentExam.id).get().then(qSnap => {
            questions = qSnap.docs.map(d => d.data());
            document.getElementById('total-idx').innerText = questions.length;
            document.getElementById('final-total').innerText = questions.length;
        });
    });

    // --- 4. LOGIC THI ---
    function startQuiz() {
        const name = document.getElementById('student-name').value;
        const clazz = document.getElementById('student-class').value;
        if(!name || !clazz) return alert("Vui lòng nhập đủ thông tin!");

        document.getElementById('display-name').innerText = name;
        document.getElementById('display-class').innerText = clazz;
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');

        showQuestion();
        startTimer(15); // Thời gian mặc định 15 phút
    }

    function showQuestion() {
        const qData = questions[currentIndex];
        document.getElementById('question-text').innerText = `Câu ${currentIndex + 1}: ${qData.q}`;
        document.getElementById('current-idx').innerText = currentIndex + 1;

        const box = document.getElementById('options-box');
        box.innerHTML = '';

        qData.a.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(btn, idx, qData.correct);
            box.appendChild(btn);
        });
    }

    function checkAnswer(btn, idx, correct) {
        const btns = document.querySelectorAll('.option-btn');
        btns.forEach(b => b.disabled = true);

        if(idx === correct) {
            btn.classList.add('correct');
            score++;
        } else {
            btn.classList.add('wrong');
            btns[correct].classList.add('correct');
        }

        setTimeout(() => {
            currentIndex++;
            if(currentIndex < questions.length) {
                showQuestion();
            } else {
                finishExam();
            }
        }, 1200);
    }

    function startTimer(min) {
        let sec = min * 60;
        timerInterval = setInterval(() => {
            let m = Math.floor(sec / 60);
            let s = sec % 60;
            document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
            if(sec <= 0) { clearInterval(timerInterval); finishExam(); }
            sec--;
        }, 1000);
    }

    function finishExam() {
        clearInterval(timerInterval);
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('final-score').innerText = score;
        
        // Lưu kết quả
        db.collection("results").add({
            name: document.getElementById('student-name').value,
            class: document.getElementById('student-class').value,
            examId: currentExam.id,
            examName: currentExam.name,
            score: score,
            total: questions.length,
            time: new Date()
        });
    }
</script>
</body>
</html>
