<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>SmartQuiz - Trải nghiệm thi đấu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f9; font-family: 'Segoe UI', sans-serif; }
        .quiz-container { max-width: 750px; margin: 40px auto; }
        .card { border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .option-btn { width: 100%; text-align: left; margin-bottom: 12px; padding: 16px; border: 1px solid #dee2e6; border-radius: 12px; background: #fff; transition: 0.2s; }
        .option-btn:hover:not([disabled]) { background: #f0f7ff; border-color: #3498db; }
        .correct { background: #27ae60 !important; color: white; border-color: #27ae60; }
        .wrong { background: #e74c3c !important; color: white; border-color: #e74c3c; }
        .my-rank { background: #fff3cd !important; border: 2px solid #ffc107 !important; }
        .hidden { display: none; }
        #timer { font-size: 1.4rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="container quiz-container">
    <div id="auth-screen" class="card p-5 text-center">
        <h2 class="fw-bold mb-4">SmartQuiz 🚀</h2>
        <div id="exam-status" class="alert alert-primary">Đang kết nối máy chủ...</div>
        <div id="auth-form" class="hidden text-start">
            <div class="mb-3">
                <label class="form-label fw-bold">Họ và Tên</label>
                <input type="text" id="name" class="form-control form-control-lg" placeholder="Ví dụ: Trần Thị Bình">
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold">Lớp</label>
                <input type="text" id="class" class="form-control form-control-lg" placeholder="Ví dụ: 5A2">
            </div>
            <button onclick="startQuiz()" class="btn btn-primary w-100 btn-lg shadow">Vào thi ngay</button>
        </div>
    </div>

    <div id="quiz-screen" class="card p-4 hidden">
        <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2">
            <span id="timer" class="text-danger">15:00</span>
            <span class="badge bg-secondary">Câu: <span id="current-idx">1</span> / <span id="total-idx">0</span></span>
        </div>
        <h4 id="q-text" class="mb-4 fw-bold" style="line-height: 1.6;"></h4>
        <div id="options-box"></div>
    </div>

    <div id="result-screen" class="card p-4 hidden">
        <div class="text-center mb-4">
            <h1 class="display-5 fw-bold">Kết quả: <span id="final-score">0</span>đ</h1>
            <p class="text-muted" id="stat-detail">Đúng: 0 | Sai: 0</p>
        </div>
        
        <h5 class="fw-bold mb-3 mt-4">🏆 Bảng Xếp Hạng Đề Thi</h5>
        <div class="table-responsive">
            <table class="table align-middle">
                <thead class="table-light">
                    <tr><th>#</th><th>Học sinh</th><th>Đúng</th><th>Sai</th><th>Điểm</th></tr>
                </thead>
                <tbody id="rank-list">
                    </tbody>
            </table>
        </div>
        <button onclick="location.reload()" class="btn btn-outline-secondary w-100 mt-3">Thoát</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>

<script>
    // --- 1. CONFIG FIREBASE ---
    const firebaseConfig = { apiKey: "AIzaSyBZngQdNGeFNbxz35hdZKuWxqxIxJVKaAA",
  authDomain: "quizapp-f4f00.firebaseapp.com",
  projectId: "quizapp-f4f00",
  storageBucket: "quizapp-f4f00.firebasestorage.app",
  messagingSenderId: "852224211635",
  appId: "1:852224211635:web:ef5efe4e2ed092a4960ec6" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let activeEx = null, questions = [], curIdx = 0, score = 0, timer;

    // --- 2. LẤY ĐỀ THI ---
    db.collection("exams").where("isActive", "==", true).limit(1).onSnapshot(snap => {
        if(snap.empty) { document.getElementById('exam-status').innerText = "Hiện không có đề mở."; return; }
        activeEx = {id: snap.docs[0].id, ...snap.docs[0].data()};
        document.getElementById('exam-status').classList.add('hidden');
        document.getElementById('auth-form').classList.remove('hidden');
        db.collection("questions").where("examId", "==", activeEx.id).get().then(q => {
            questions = q.docs.map(d => d.data());
            document.getElementById('total-idx').innerText = questions.length;
        });
    });

    function startQuiz() {
        if(!document.getElementById('name').value) return alert("Vui lòng nhập tên!");
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        showQ(); startTimer(15);
    }

    // --- 3. XÁO TRỘN ĐÁP ÁN (SHUFFLE) ---
    function showQ() {
        const q = questions[curIdx];
        document.getElementById('q-text').innerText = `Câu ${curIdx+1}: ${q.q}`;
        const box = document.getElementById('options-box'); box.innerHTML = '';
        
        // Tạo mảng đối tượng để xáo trộn nhưng vẫn giữ được index đáp án đúng
        let mappedOptions = q.a.map((text, index) => ({ text, isCorrect: index === q.correct }));
        
        // Thuật toán xáo trộn Fisher-Yates
        for (let i = mappedOptions.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [mappedOptions[i], mappedOptions[j]] = [mappedOptions[j], mappedOptions[i]];
        }

        mappedOptions.forEach((opt) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt.text;
            btn.onclick = () => check(btn, opt.isCorrect, mappedOptions);
            box.appendChild(btn);
        });
    }

    function check(btn, isCorrect, options) {
        const btns = document.querySelectorAll('.option-btn');
        btns.forEach(b => b.disabled = true);

        if(isCorrect) {
            btn.classList.add('correct');
            score++;
        } else {
            btn.classList.add('wrong');
            // Tìm và highlight đáp án đúng
            btns.forEach((b, idx) => { if(options[idx].isCorrect) b.classList.add('correct'); });
        }

        setTimeout(() => {
            curIdx++;
            if(curIdx < questions.length) { 
                showQ(); 
                document.getElementById('current-idx').innerText = curIdx+1; 
            } else finish();
        }, 1200);
    }

    function startTimer(m) {
        let s = m * 60;
        timer = setInterval(() => {
            let mins = Math.floor(s/60), secs = s%60;
            document.getElementById('timer').innerText = `${mins}:${secs<10?'0':''}${secs}`;
            if(s-- <= 0) { clearInterval(timer); finish(); }
        }, 1000);
    }

    // --- 4. KẾT THÚC & XẾP HẠNG ---
    function finish() {
        clearInterval(timer);
        const total = questions.length;
        const g10 = ((score/total)*10).toFixed(2);
        const wrong = total - score;
        const studentName = document.getElementById('name').value;

        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('final-score').innerText = g10;
        document.getElementById('stat-detail').innerText = `Đúng: ${score} | Sai: ${wrong}`;

        const res = { 
            name: studentName, 
            class: document.getElementById('class').value, 
            examId: activeEx.id, 
            score: score, 
            wrong: wrong,
            grade10: g10, 
            time: new Date() 
        };

        db.collection("results").add(res).then(() => loadRanking(activeEx.id, studentName));
    }

    function loadRanking(exId, myName) {
        db.collection("results").where("examId", "==", exId).orderBy("score", "desc").orderBy("time", "asc").onSnapshot(snap => {
            const list = document.getElementById('rank-list');
            list.innerHTML = '';
            snap.docs.forEach((doc, i) => {
                const d = doc.data();
                const isMe = (d.name === myName);
                list.innerHTML += `
                <tr class="${isMe ? 'my-rank fw-bold' : ''}">
                    <td>${i+1}</td>
                    <td>${d.name} ${isMe ? '(Bạn)' : ''}</td>
                    <td class="text-success">${d.score}</td>
                    <td class="text-danger">${d.wrong || 0}</td>
                    <td><span class="badge bg-primary">${d.grade10}</span></td>
                </tr>`;
            });
        });
    }
</script>
</body>
</html>
